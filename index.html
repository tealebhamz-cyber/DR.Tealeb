<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>نظام المعمل - V3</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif;}
body{background:#f4f6f9;}

/* LOGIN */
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:#0f172a;}
.login-box{background:#fff;padding:25px;border-radius:12px;width:340px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;}
button{cursor:pointer}
.btn{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px}

/* LAYOUT */
.container{display:flex;min-height:100vh;}
.sidebar{width:240px;background:#111827;color:#fff;padding:15px}
.sidebar h2{margin-bottom:20px}
.menu button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#1f2937;color:#fff}
.menu button:hover{background:#374151}
.main{flex:1;padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.hidden{display:none}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;font-size:14px}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center}
.modal-box{background:#fff;padding:20px;border-radius:12px;width:420px}
.modal.show{display:flex}

.btn2{background:#16a34a;color:#fff;padding:8px 12px;border:none;border-radius:8px;margin-top:10px}
.btn3{background:#dc2626;color:#fff;padding:8px 12px;border:none;border-radius:8px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <h3>تسجيل الدخول</h3>
    <input id="u" placeholder="اسم المستخدم">
    <input id="p" type="password" placeholder="كلمة المرور">
    <button class="btn" onclick="login()">دخول</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div class="container">

<div class="sidebar">
<h2>المعمل</h2>
<div class="menu">
<button onclick="show('dash')">الرئيسية</button>
<button onclick="show('patients')">المرضى</button>
<button onclick="show('results')">النتائج</button>
<button onclick="show('invoices')">الفواتير</button>
<button onclick="show('chart')">إحصائيات</button>
</div>
</div>

<div class="main">

<div id="dash" class="card section">
<h3>لوحة التحكم</h3>
<p>أهلاً 👋</p>
</div>

<!-- PATIENTS -->
<div id="patients" class="card section hidden">
<h3>المرضى</h3>
<button class="btn2" onclick="openModal()">إضافة مريض</button>
<table>
<thead><tr><th>الاسم</th><th>التلفون</th><th>الفرع</th><th>إجراء</th></tr></thead>
<tbody id="pt"></tbody>
</table>
</div>

<!-- RESULTS -->
<div id="results" class="card section hidden">
<h3>النتائج</h3>
<table>
<tbody id="rt"></tbody>
</table>
</div>

<!-- INVOICES -->
<div id="invoices" class="card section hidden">
<h3>الفواتير</h3>
<table>
<tbody id="it"></tbody>
</table>
</div>

<!-- CHART -->
<div id="chart" class="card section hidden">
<h3>إحصائيات</h3>
<canvas id="c"></canvas>
</div>

</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="m">
  <div class="modal-box">
    <h3>إضافة مريض</h3>
    <input id="n" placeholder="الاسم">
    <input id="ph" placeholder="التلفون">
    <input id="b" placeholder="الفرع">
    <button class="btn2" onclick="addPatient()">حفظ</button>
    <button class="btn3" onclick="closeModal()">إغلاق</button>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,getDocs,deleteDoc,updateDoc,doc,query,where,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyD4QlQx0flDQqSrlMAG00GeG-KnzYBFPhc",
  authDomain:"medlab-tayelab.firebaseapp.com",
  projectId:"medlab-tayelab",
  storageBucket:"medlab-tayelab.firebasestorage.app",
  messagingSenderId:"482723222986",
  appId:"1:482723222986:web:1849d08859cb7e47f1ab33"
});
const db=getFirestore(app);

const DEFAULT_USERS=[
  {u:'admin',p:'admin123',name:'أدمن',role:'admin',branch:'all',av:'AD',target:0},
  {u:'cairo1',p:'c1pass',name:'أحمد سعيد',role:'staff',branch:'القاهرة',av:'أح',target:30},
  {u:'cairo2',p:'c2pass',name:'منى علي',role:'staff',branch:'القاهرة',av:'من',target:25},
  {u:'cairo3',p:'c3pass',name:'خالد محمود',role:'staff',branch:'القاهرة',av:'خا',target:20},
  {u:'zaq1',p:'z1pass',name:'سارة حسن',role:'staff',branch:'الزقازيق',av:'سا',target:20},
  {u:'zaq2',p:'z2pass',name:'عمر إبراهيم',role:'staff',branch:'الزقازيق',av:'عم',target:15},
  {u:'abo1',p:'a1pass',name:'فاطمة رضا',role:'staff',branch:'أبو حماد',av:'فا',target:10},
];

let CU=null;
let USERS=[];
let AP=[],AR=[],AI=[];
let FS={p:'all',r:'all',i:'all'};

const N=id=>document.getElementById(id);
function toast(m,ok=false){const t=N('toast');t.textContent=m;t.style.background=ok?'#27500A':'#1a1a2e';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

async function loadUsers(){
  const snap=await getDocs(collection(db,'users'));

  if(snap.empty){
    for(const u of DEFAULT_USERS){
      await addDoc(collection(db,'users'),u);
    }
    const snap2=await getDocs(collection(db,'users'));
    USERS=snap2.docs.map(d=>({id:d.id,...d.data()}));
  }else{
    USERS=snap.docs.map(d=>({id:d.id,...d.data()}));
  }
}

async function ensureUsers(){
  if(!USERS.length){
    await loadUsers();
  }
}

window.doLogin=async function(){
  const u=N('lu').value.trim();
  const p=N('lp').value.trim();

  await ensureUsers();

  const f=USERS.find(x=>x.u===u&&x.p===p);

  if(!f){
    N('lerr').style.display='block';
    return;
  }

  CU=f;
  N('lerr').style.display='none';

  N('pg-login').classList.remove('active');
  N('pg-dash').classList.add('active');

  init();
};

window.logout=function(){
  CU=null;
  AP=[];AR=[];AI=[];
  N('pg-dash').classList.remove('active');
  N('pg-login').classList.add('active');
};

async function init(){
  await ensureUsers();
  await loadAll();
}

async function loadAll(){
  await Promise.all([loadP(),loadR(),loadI()]);
}

function bldQ(col){
  return CU.role==='admin'
    ?query(collection(db,col),orderBy('createdAt','desc'))
    :query(collection(db,col),where('branch','==',CU.branch),orderBy('createdAt','desc'));
}

async function loadP(){
  const s=await getDocs(bldQ('patients'));
  AP=s.docs.map(d=>({id:d.id,...d.data()}));
}

async function loadR(){
  const s=await getDocs(bldQ('results'));
  AR=s.docs.map(d=>({id:d.id,...d.data()}));
}

async function loadI(){
  const s=await getDocs(bldQ('invoices'));
  AI=s.docs.map(d=>({id:d.id,...d.data()}));
}

window.ft=function(){/* keep UI calls unchanged in your original file */};
window.sf=function(){/* keep UI calls unchanged in your original file */};

loadUsers();

</script>
</body>
</html>
