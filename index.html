<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>نظام المعمل - V3</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif;}
body{background:#f4f6f9;}

/* LOGIN */
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:#0f172a;}
.login-box{background:#fff;padding:25px;border-radius:12px;width:340px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;}
button{cursor:pointer}
.btn{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px}

/* LAYOUT */
.container{display:flex;min-height:100vh;}
.sidebar{width:240px;background:#111827;color:#fff;padding:15px}
.sidebar h2{margin-bottom:20px}
.menu button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#1f2937;color:#fff}
.menu button:hover{background:#374151}
.main{flex:1;padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.hidden{display:none}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;font-size:14px}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center}
.modal-box{background:#fff;padding:20px;border-radius:12px;width:420px}
.modal.show{display:flex}

.btn2{background:#16a34a;color:#fff;padding:8px 12px;border:none;border-radius:8px;margin-top:10px}
.btn3{background:#dc2626;color:#fff;padding:8px 12px;border:none;border-radius:8px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <h3>تسجيل الدخول</h3>
    <input id="u" placeholder="اسم المستخدم">
    <input id="p" type="password" placeholder="كلمة المرور">
    <button class="btn" onclick="login()">دخول</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div class="container">

<div class="sidebar">
<h2>المعمل</h2>
<div class="menu">
<button onclick="show('dash')">الرئيسية</button>
<button onclick="show('patients')">المرضى</button>
<button onclick="show('results')">النتائج</button>
<button onclick="show('invoices')">الفواتير</button>
<button onclick="show('chart')">إحصائيات</button>
</div>
</div>

<div class="main">

<div id="dash" class="card section">
<h3>لوحة التحكم</h3>
<p>أهلاً 👋</p>
</div>

<!-- PATIENTS -->
<div id="patients" class="card section hidden">
<h3>المرضى</h3>
<button class="btn2" onclick="openModal()">إضافة مريض</button>
<table>
<thead><tr><th>الاسم</th><th>التلفون</th><th>الفرع</th><th>إجراء</th></tr></thead>
<tbody id="pt"></tbody>
</table>
</div>

<!-- RESULTS -->
<div id="results" class="card section hidden">
<h3>النتائج</h3>
<table>
<tbody id="rt"></tbody>
</table>
</div>

<!-- INVOICES -->
<div id="invoices" class="card section hidden">
<h3>الفواتير</h3>
<table>
<tbody id="it"></tbody>
</table>
</div>

<!-- CHART -->
<div id="chart" class="card section hidden">
<h3>إحصائيات</h3>
<canvas id="c"></canvas>
</div>

</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="m">
  <div class="modal-box">
    <h3>إضافة مريض</h3>
    <input id="n" placeholder="الاسم">
    <input id="ph" placeholder="التلفون">
    <input id="b" placeholder="الفرع">
    <button class="btn2" onclick="addPatient()">حفظ</button>
    <button class="btn3" onclick="closeModal()">إغلاق</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
projectId:"medlab-tayelab"
});

const db = getFirestore(app);

let users=[{u:"admin",p:"admin123"}];
let current=null;

// LOGIN
window.login=async function(){
let u=u=document.getElementById('u').value;
let p=document.getElementById('p').value;
let f=users.find(x=>x.u===u&&x.p===p);
if(!f)return alert("خطأ");
current=f;
document.getElementById('login').style.display='none';
document.getElementById('app').classList.remove('hidden');
loadAll();
}

// NAV
window.show=function(id){
document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
}

// LOAD ALL
async function loadAll(){
loadPatients();
loadResults();
loadInvoices();
loadChart();
}

// PATIENTS
async function loadPatients(){
const s=await getDocs(collection(db,"patients"));
let h="";
s.forEach(d=>{
let x=d.data();
h+=`<tr>
<td>${x.name}</td>
<td>${x.phone}</td>
<td>${x.branch}</td>
<td><button onclick="del('patients','${d.id}')">حذف</button></td>
</tr>`;
});
document.getElementById('pt').innerHTML=h;
}

// RESULTS
async function loadResults(){
const s=await getDocs(collection(db,"results"));
let h="";
s.forEach(d=>{
let x=d.data();
h+=`<tr><td>${x.patient||""} - ${x.test||""}</td></tr>`;
});
document.getElementById('rt').innerHTML=h;
}

// INVOICES
async function loadInvoices(){
const s=await getDocs(collection(db,"invoices"));
let h="";
s.forEach(d=>{
let x=d.data();
h+=`<tr><td>${x.patient||""} - ${x.total||0}</td></tr>`;
});
document.getElementById('it').innerHTML=h;
}

// ADD PATIENT
window.addPatient=async function(){
await addDoc(collection(db,"patients"),{
name:document.getElementById('n').value,
phone:document.getElementById('ph').value,
branch:document.getElementById('b').value
});
closeModal();loadPatients();loadChart();
}

// DELETE
window.del=async function(col,id){
await deleteDoc(doc(db,col,id));
loadAll();
}

// MODAL
window.openModal=()=>document.getElementById('m').classList.add('show');
window.closeModal=()=>document.getElementById('m').classList.remove('show');

// CHART
async function loadChart(){
const s=await getDocs(collection(db,"patients"));
let b={};
s.forEach(d=>{
let x=d.data().branch||"unknown";
b[x]=(b[x]||0)+1;
});

new Chart(document.getElementById('c'),{
type:'bar',
data:{labels:Object.keys(b),datasets:[{data:Object.values(b)}]}
});
}

</script>
</body>
</html>
